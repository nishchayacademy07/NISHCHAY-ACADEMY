<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | Nishchay Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    html.light-mode {
      --dark: #F8FAFC; --dark2: #FFFFFF; --dark3: #F1F5F9; --dark4: #E2E8F0;
      --text: #334155; --muted: #64748B;
      --heading-color: #0F172A;
      --border-dim: rgba(0,0,0,0.08);
      --border-med: rgba(0,0,0,0.15);
    }
    :root {
      --heading-color: #fff;
      --border-dim: rgba(255,255,255,0.07);
      --border-med: rgba(255,255,255,0.15);
    }
        /* ─── AUTH PAGE STYLES ─────────────────────────── */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(79,124,255,0.08) 0%, transparent 70%),
                        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(201,168,76,0.08) 0%, transparent 60%),
                        var(--dark);
            padding: 40px 20px;
        }
        .auth-card {
            background: var(--dark3);
            border: 1px solid rgba(201,168,76,0.2);
            width: 100%;
            max-width: 460px;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            overflow: hidden;
            position: relative;
        }
        .auth-header {
            text-align: center;
            padding: 36px 24px 16px;
        }
        .auth-logo {
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: 12px;
        }
        .auth-body {
            padding: 0 30px 30px;
        }
        /* ─── AUTH TABS ─────────────────────────────────── */
        .auth-tabs {
            display: flex;
            margin: 0 30px 0;
            border-bottom: 1px solid var(--border-dim);
        }
        .auth-tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--muted);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            margin-bottom: -1px;
        }
        .auth-tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }
        .auth-tab:hover { color: var(--text); }
        /* ─── FORM CONTROLS ─────────────────────────────── */
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .form-control {
            width: 100%;
            background: var(--dark);
            border: 1px solid var(--border-dim);
            color: var(--text);
            padding: 11px 16px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
        }
        .form-control::placeholder { color: var(--muted); }
        /* ─── BUTTONS ───────────────────────────────────── */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none; border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700; font-size: 0.95rem;
            cursor: pointer; transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--gold); color: #0A0A0F;
            box-shadow: 0 6px 20px rgba(201,168,76,0.3);
        }
        .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
        /* ─── AUTH FORM ANIMATIONS ──────────────────────── */
        .auth-form {
            display: none;
            animation: fadeIn 0.35s ease;
        }
        .auth-form.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        /* ─── MISC ──────────────────────────────────────── */
        .back-to-home {
            position: absolute;
            top: 18px;
            left: 20px;
            color: var(--muted);
            font-size: 1.1rem;
            z-index: 10;
            transition: color 0.2s;
        }
        .back-to-home:hover { color: var(--gold); }
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            margin-top: -8px;
            margin-bottom: 18px;
            color: var(--gold);
            text-decoration: none;
        }
        .forgot-link:hover { text-decoration: underline; }
        .auth-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-bottom: 14px;
            display: none;
            padding: 10px 14px;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px;
        }
        .auth-error.visible { display: block; }
    </style>
</head>
<script>
  if (localStorage.getItem('theme') === 'light' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)) {
    document.documentElement.classList.add('light-mode');
  }
</script>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="back-to-home"><i class="fa-solid fa-arrow-left"></i></a>
            
            <!-- Nav (Simple) -->
<nav style="position:fixed; top:0; left:0; right:0; padding:1.5rem 5%; display:flex; justify-content:space-between; align-items:center; z-index:100;">
  <a href="index.html" class="nav-logo" style="text-decoration:none; font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--gold);">Nishchay<span style="color:var(--text);"> Academy</span></a>
  <div style="display:flex; gap:1.5rem; align-items:center;">
    <button id="themeToggleBtn" style="background:transparent; border:none; color:var(--text); font-size:1.2rem; cursor:pointer;"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
    <a href="index.html" style="color:var(--muted); text-decoration:none; font-size:0.85rem; font-weight:600;">Back to Home</a>
  </div>
</nav>
            <div class="auth-header">
                <div class="auth-logo"><i class="fa-solid fa-graduation-cap"></i></div>
                <h2 id="authTitle" style="color: var(--text); font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900;">Welcome Back</h2>
                <p id="authSubtitle" style="color: var(--muted); font-size: 0.88rem; margin-top: 4px;">Please enter your details to sign in.</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="signup">Sign Up</div>
            </div>

            <div class="auth-body">
                <!-- Error Message -->
                <div id="authError" class="auth-error"></div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="Enter your email" required id="loginEmail">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="Enter your password" required id="loginPassword" minlength="6">
                    </div>
                    <a href="#" class="forgot-link" id="forgotLink">Forgot Password?</a>
                    <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">Sign In</button>
                </form>

                <!-- Sign Up Form -->
                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="John Doe" required id="signupName" minlength="2">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="Enter your email" required id="signupEmail">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password (min 6 characters)</label>
                        <input type="password" class="form-control" placeholder="Create a password" required id="signupPassword" minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="signupBtn">Create Account</button>
                </form>

            </div>
        </div>
    </div>

    <!-- Tawk.to Script -->
    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true;

    <!-- Scripts -->
    <script type="module">
        import { applyGlobalSettings } from './settings.js';
        import { login, signUp, redirectIfLoggedIn } from './auth.js';

        // Settings Initialization
        applyGlobalSettings();

        // Bug #15 fix: redirect if already logged in
        redirectIfLoggedIn();

        const errorEl = document.getElementById('authError');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add('visible');
        }
        function hideError() {
            errorEl.classList.remove('visible');
        }

        // Tab Switcher — Bug fix: use event listeners instead of inline onclick
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabId = this.dataset.tab;
                hideError();
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
                if (tabId === 'login') {
                    document.getElementById('loginForm').classList.add('active');
                    document.getElementById('authTitle').innerText = 'Welcome Back';
                    document.getElementById('authSubtitle').innerText = 'Please enter your details to sign in.';
                } else {
                    document.getElementById('signupForm').classList.add('active');
                    document.getElementById('authTitle').innerText = 'Create Account';
                    document.getElementById('authSubtitle').innerText = 'Start your learning journey with us.';
                }
            });
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            try {
                btn.disabled = true;
                btn.innerText = 'Signing in...';
                await login(email, pass);
                window.location.href = "dashboard.html";
            } catch (err) {
                showError(err.message || 'Login failed. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Sign In';
            }
        });

        // Signup
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const pass = document.getElementById('signupPassword').value;
            const btn = document.getElementById('signupBtn');
            
            try {
                btn.disabled = true;
                btn.innerText = 'Creating account...';
                await signUp(name, email, pass);
                window.location.href = "dashboard.html";
            } catch (err) {
                showError(err.message || 'Signup failed. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Create Account';
            }
        });

        // Forgot password
        document.getElementById('forgotLink').addEventListener('click', function(e) {
            e.preventDefault();
            alert("Please contact support at support@nishchayacademy.com for password recovery.");
        });
      const themeToggle = document.getElementById('themeToggleBtn');
  const themeIcon = document.getElementById('themeIcon');
  if(themeToggle) {
    if(document.documentElement.classList.contains('light-mode')) {
      themeIcon.classList.replace('fa-moon', 'fa-sun');
    }
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('light-mode');
      const isLight = document.documentElement.classList.contains('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      themeIcon.className = isLight ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    });
  }

</script>
</body>
</html>
