<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | Nishchay Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255,255,255,1) 0%, rgba(225,238,255,1) 100%);
            padding: 40px 20px;
        }
        .auth-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
        }
        .auth-header {
            text-align: center;
            padding: 30px 20px 20px;
        }
        .auth-logo {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .auth-body {
            padding: 0 30px 30px;
        }
        .auth-form {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .auth-form.active {
            display: block;
        }
        .social-auth {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-social {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: var(--radius-md);
            background: var(--white);
            color: var(--text-dark);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-social:hover {
            background: #f8f9fa;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ced4da;
        }
        .divider::before { margin-right: .25em; }
        .divider::after { margin-left: .25em; }
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.9rem;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        .back-to-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-light);
            font-size: 1.2rem;
            z-index: 10;
        }
        .back-to-home:hover {
            color: var(--primary-color);
        }
        .auth-error {
            color: #dc3545;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
            padding: 10px;
            background: #f8d7da;
            border-radius: var(--radius-sm);
        }
        .auth-error.visible {
            display: block;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="back-to-home"><i class="fa-solid fa-arrow-left"></i></a>
            
            <div class="auth-header">
                <div class="auth-logo"><i class="fa-solid fa-graduation-cap"></i></div>
                <h2 id="authTitle" style="color: var(--text-dark);">Welcome Back</h2>
                <p id="authSubtitle" style="color: var(--text-light); font-size: 0.9rem;">Please enter your details to sign in.</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="signup">Sign Up</div>
            </div>

            <div class="auth-body">
                <!-- Error Message -->
                <div id="authError" class="auth-error"></div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="Enter your email" required id="loginEmail">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="Enter your password" required id="loginPassword" minlength="6">
                    </div>
                    <a href="#" class="forgot-link" id="forgotLink">Forgot Password?</a>
                    <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">Sign In</button>
                </form>

                <!-- Sign Up Form -->
                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="John Doe" required id="signupName" minlength="2">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="Enter your email" required id="signupEmail">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password (min 6 characters)</label>
                        <input type="password" class="form-control" placeholder="Create a password" required id="signupPassword" minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="signupBtn">Create Account</button>
                </form>

            </div>
        </div>
    </div>

    <!-- Tawk.to Script -->
    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true;
            s1.src='https://embed.tawk.to/69cf86d453d34c1c35ed8d3a/1jl9ba368';
            s1.charset='UTF-8';
            s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();
    </script>

    <!-- Scripts -->
    <script type="module">
        import { applyGlobalSettings } from './settings.js';
        import { login, signUp, redirectIfLoggedIn } from './auth.js';

        // Settings Initialization
        applyGlobalSettings();

        // Bug #15 fix: redirect if already logged in
        redirectIfLoggedIn();

        const errorEl = document.getElementById('authError');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add('visible');
        }
        function hideError() {
            errorEl.classList.remove('visible');
        }

        // Tab Switcher — Bug fix: use event listeners instead of inline onclick
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabId = this.dataset.tab;
                hideError();
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
                if (tabId === 'login') {
                    document.getElementById('loginForm').classList.add('active');
                    document.getElementById('authTitle').innerText = 'Welcome Back';
                    document.getElementById('authSubtitle').innerText = 'Please enter your details to sign in.';
                } else {
                    document.getElementById('signupForm').classList.add('active');
                    document.getElementById('authTitle').innerText = 'Create Account';
                    document.getElementById('authSubtitle').innerText = 'Start your learning journey with us.';
                }
            });
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            try {
                btn.disabled = true;
                btn.innerText = 'Signing in...';
                await login(email, pass);
                window.location.href = "dashboard.html";
            } catch (err) {
                showError(err.message || 'Login failed. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Sign In';
            }
        });

        // Signup
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const pass = document.getElementById('signupPassword').value;
            const btn = document.getElementById('signupBtn');
            
            try {
                btn.disabled = true;
                btn.innerText = 'Creating account...';
                await signUp(name, email, pass);
                window.location.href = "dashboard.html";
            } catch (err) {
                showError(err.message || 'Signup failed. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Create Account';
            }
        });

        // Forgot password
        document.getElementById('forgotLink').addEventListener('click', function(e) {
            e.preventDefault();
            alert("Please contact support at support@nishchayacademy.com for password recovery.");
        });
    </script>
</body>
</html>
