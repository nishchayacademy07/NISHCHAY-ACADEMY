<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Nishchay Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-color);
        }
        .topbar {
            background-color: var(--white);
            padding: 15px 30px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: #e1eeff;
            color: var(--primary-color);
        }
        .stat-info h3 {
            font-size: 1.8rem;
            margin-bottom: 0;
            color: var(--text-dark);
        }
        .stat-info p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin: 0;
        }
        .course-progress-card {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }
        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .course-header h4 {
            color: var(--text-dark);
            margin: 0;
        }
        .progress-text {
            font-size: 0.9rem;
            color: var(--text-light);
            text-align: right;
            margin-top: 5px;
        }
        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-dark);
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .mobile-toggle {
                display: block;
            }
            .sidebar {
                position: fixed;
                left: -250px;
                height: 100vh;
                z-index: 1000;
            }
            .sidebar.active {
                left: 0;
                box-shadow: var(--shadow-lg);
            }
        }
    </style>
</head>
<body>

    <!-- Topbar -->
    <div class="topbar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="mobile-toggle" id="mobileToggle">
                <i class="fa-solid fa-bars"></i>
            </button>
            <a href="index.html" class="navbar-brand" style="font-size: 1.2rem;">
                <i class="fa-solid fa-graduation-cap"></i> Nishchay Academy
            </a>
        </div>
        <!-- Bug #10 fix: replaced invalid inline @media with proper CSS class -->
        <div class="user-menu">
            <div class="user-info-desktop">
                <p id="dashboardUserName" style="margin: 0; font-weight: 500; color: var(--text-dark); font-size: 0.9rem;">Loading...</p>
                <small style="color: var(--text-light);">Student</small>
            </div>
            <div id="dashboardAvatar" class="user-avatar">...</div>
            <i class="fa-solid fa-chevron-down" style="color: var(--text-light); font-size: 0.8rem;"></i>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <div class="sidebar" id="sidebar">
            <div style="padding: 0 20px 20px; color: var(--text-light); font-size: 0.8rem; text-transform: uppercase; font-weight: 600;">Menu</div>
            <a href="#" class="sidebar-link active" data-section="overview">
                <i class="fa-solid fa-border-all" style="width: 20px;"></i> Dashboard
            </a>
            <a href="#" class="sidebar-link" data-section="courses">
                <i class="fa-solid fa-book-open" style="width: 20px;"></i> My Courses
            </a>
            <a href="#" class="sidebar-link" data-section="profile">
                <i class="fa-solid fa-user" style="width: 20px;"></i> My Profile
            </a>
            <div style="margin-top: 50px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 20px;">
                <!-- Bug #5 fix: logout button calls real logout -->
                <a href="#" class="sidebar-link" style="color: #dc3545;" id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket" style="width: 20px;"></i> Logout
                </a>
            </div>
        </div>

        <!-- Content Area -->
        <div class="dashboard-content">
            <!-- Bug #12 fix: welcome message has an ID for dynamic update -->
            <div style="margin-bottom: 30px;">
                <h2 id="welcomeMessage" style="color: var(--text-dark); margin-bottom: 5px;">Welcome back! 👋</h2>
                <p style="color: var(--text-light);">Here's your learning progress for today.</p>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-book"></i></div>
                    <div class="stat-info">
                        <h3 id="statEnrolled">0</h3>
                        <p>Enrolled Courses</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #e6f9ea; color: #28a745;"><i class="fa-solid fa-check-circle"></i></div>
                    <div class="stat-info">
                        <h3 id="statCompleted">0</h3>
                        <p>Completed Lessons</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #fff3cd; color: #ffc107;"><i class="fa-solid fa-clock"></i></div>
                    <div class="stat-info">
                        <h3 id="statHours">0h</h3>
                        <p>Hours Studied</p>
                    </div>
                </div>
            </div>

            <!-- Active Courses Section -->
            <div id="coursesSection" style="margin-top: 40px;">
                <h3 style="color: var(--text-dark); margin-bottom: 20px;">Continue Learning</h3>
                <div id="enrolledCoursesContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                    <p style="color: var(--text-light);">Loading your courses...</p>
                </div>
            </div>

            <!-- Bug #22 fix: Profile form uses IDs for dynamic population -->
            <div id="profileSection" style="display: none; margin-top: 40px;">
                <div style="background: var(--white); padding: 30px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm);">
                    <h3 style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">My Profile</h3>
                    <form id="profileForm">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="profileName" value="">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="profileEmail" value="" disabled>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Tawk.to Script -->
    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true;
            s1.src='https://embed.tawk.to/69cf86d453d34c1c35ed8d3a/1jl9ba368';
            s1.charset='UTF-8';
            s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();
    </script>

    <!-- Scripts -->
    <script type="module">
        import { applyGlobalSettings } from './settings.js';
        import { loadStudentDashboard, logout } from './dashboard.js';
        
        // Settings Initialization
        applyGlobalSettings();
        
        // Initialize dashboard
        loadStudentDashboard();

        // Mobile toggle
        document.getElementById('mobileToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
        });

        // Bug #5 fix: Logout button calls real logout
        document.getElementById('logoutBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            try {
                await logout();
            } catch (err) {
                alert('Logout failed: ' + err.message);
            }
        });

        // Profile form submit
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Profile updated!');
        });

        // Sidebar section switching — using event listeners instead of inline onclick
        document.querySelectorAll('.sidebar-link[data-section]').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const section = this.dataset.section;

                document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');

                const statsContainer = document.querySelector('.stat-card')?.parentElement;
                const coursesSection = document.getElementById('coursesSection');
                const profileSection = document.getElementById('profileSection');

                if (section === 'profile') {
                    if (statsContainer) statsContainer.style.display = 'none';
                    if (coursesSection) coursesSection.style.display = 'none';
                    profileSection.style.display = 'block';
                } else {
                    if (statsContainer) statsContainer.style.display = '';
                    if (coursesSection) coursesSection.style.display = '';
                    profileSection.style.display = 'none';
                }
                
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
